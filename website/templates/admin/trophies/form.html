{% extends 'admin/base.html' %}
{% import 'admin/_macros.html' as ui %}
{% set lbl = "text-sm font-semibold text-base-content/60 mb-0.5 block" %}

{% block admin_content %}
{{ ui.header('Badge' if trophy else 'Nouveau badge', 'ph-trophy') }}

<div class="card bg-base-100 shadow-md max-w-xl">
  <form method="post"
        action="{{ url_for('admin.edit_trophy', trophy_id=trophy.id) if trophy else url_for('admin.create_trophy') }}"
        class="card-body space-y-3">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="flex flex-col gap-1">
      <label for="name" class="{{ lbl }}">Nom</label>
      <input type="text" id="name" name="name" class="input input-bordered w-full"
             value="{{ trophy.name if trophy else '' }}" required autocomplete="off">
    </div>

    <div class="flex flex-col gap-1">
      <label for="icon" class="{{ lbl }}">Icône
        <span class="font-normal text-xs text-base-content/40">(chemin ou URL, optionnel)</span></label>
      <input type="text" id="icon" name="icon" class="input input-bordered w-full"
             value="{{ trophy.icon if trophy and trophy.icon else '' }}">
    </div>

    <label class="flex items-center gap-2 cursor-pointer select-none">
      <input type="checkbox" name="unique" class="toggle toggle-primary toggle-sm"
             {% if trophy and trophy.unique %}checked{% endif %}>
      <span class="text-sm text-base-content/60">Badge unique (une seule fois par utilisateur)</span>
    </label>

    <div class="flex justify-end gap-2 pt-2">
      <a href="{{ url_for('admin.list_trophies') }}" class="btn btn-ghost">Annuler</a>
      <button type="submit" class="btn btn-primary">Enregistrer</button>
    </div>
  </form>
</div>
{% endblock %}
